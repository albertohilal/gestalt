<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestalt - Test Simple</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: Arial, sans-serif; background: #f6f6f6; }
    #sketch { width: 100%; height: calc(100% - 100px); display: flex; align-items: center; justify-content: center;  background: white; }
    #controls { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: #f0f0f0; border-top: 1px solid #ddd; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 4px; }
    button:hover { background: #1976D2; }
    #status { position: fixed; top: 0; right: 0; background: rgba(0,0,0,0.8); color: lime; padding: 10px; font-family: monospace; font-size: 12px; max-width: 300px; }
  </style>
</head>
<body>
  <div id="sketch"></div>
  <div id="controls">
    <button onclick="setLey(0)">Intro</button>
    <button onclick="setLey(1)">Agrupación</button>
    <button onclick="setLey(2)">Proximidad</button>
  </div>
  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script>
    const status = document.getElementById('status');
    function updateStatus(msg) {
      status.innerHTML += msg + '<br>';
      console.log(msg);
    }
    updateStatus('Página cargada');
  </script>

  <script src="./contenido.js"></script>
  <script>
    updateStatus('contenido.js cargado');
  </script>

  <script>
    let leyActual = 0;
    let parametro = 0.5;

    function setLey(n) {
      leyActual = n;
      updateStatus(`setLey(${n})`);
      redraw();
    }

    function setup() {
      updateStatus('setup() iniciando');
      const w = windowWidth;
      const h = windowHeight - 100;
      createCanvas(w, h);
      background(250);
      updateStatus('Canvas creado: ' + w + 'x' + h);
      noLoop();
    }

    function draw() {
      background(250);
      fill(0);
      textSize(24);
      textAlign(CENTER, CENTER);
      
      const titles = ['Introducción', 'Agrupación', 'Proximidad'];
      text(titles[leyActual] || 'Desconocido', width/2, height/2);
      
      if (leyActual === 2) {
        // Dibujar ejemplo simple
        fill(30);
        for (let i = 0; i < 50; i++) {
          circle(width * 0.3 + random(50), height * 0.5 + i * 15, 4);
          circle(width * 0.7 + random(50), height * 0.5 + i * 15, 4);
        }
      }
    }

    updateStatus('Script iniciado');
  </script>
</body>
</html>

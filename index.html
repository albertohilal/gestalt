<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leyes de la Gestalt — p5.js</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="intro-overlay" style="display:block;">
    <div id="intro-inner">
      <h1 id="intro-titulo"></h1>
      <hr>
      <h2 class="gestalt" id="intro-gestalt-titulo"></h2>
      <p id="intro-gestalt-texto"></p>
      <h2 class="arnheim" id="intro-arnheim-titulo"></h2>
      <p id="intro-arnheim-texto"></p>
    </div>
  </div>

  <div id="agrupacion-overlay" style="display:none;">
    <div id="agrupacion-inner">
      <h1 id="agrupacion-titulo"></h1>
      <h2 id="agrupacion-subtitulo" style="font-size:1.2em;color:#1a5aaa;font-weight:600;margin:18px 0 18px 0;"></h2>
      <p id="agrupacion-texto"></p>
    </div>
  </div>
  <div id="semejanza-previa-overlay" style="display:none;">
    <div id="semejanza-previa-inner">
      <h1 id="semejanza-previa-titulo"></h1>
      <h2 id="semejanza-previa-subtitulo" style="font-size:1.2em;color:#1a5aaa;font-weight:600;margin:18px 0 18px 0;"></h2>
      <p id="semejanza-previa-texto"></p>
    </div>
  </div>
  <div id="continuidad-previa-overlay" style="display:none;">
    <div id="continuidad-previa-inner">
      <h1 id="continuidad-previa-titulo"></h1>
      <h2 id="continuidad-previa-subtitulo" style="font-size:1.2em;color:#1a5aaa;font-weight:600;margin:18px 0 18px 0;"></h2>
      <p id="continuidad-previa-texto"></p>
    </div>
  </div>
  <div id="cierre-previa-overlay" style="display:none;">
    <div id="cierre-previa-inner">
      <h1 id="cierre-previa-titulo"></h1>
      <h2 id="cierre-previa-subtitulo" style="font-size:1.2em;color:#1a5aaa;font-weight:600;margin:18px 0 18px 0;"></h2>
      <p id="cierre-previa-texto"></p>
    </div>
  </div>
  <div id="simetria-previa-overlay" style="display:none;">
    <div id="simetria-previa-inner">
      <h1 id="simetria-previa-titulo"></h1>
      <h2 id="simetria-previa-subtitulo" style="font-size:1.2em;color:#1a5aaa;font-weight:600;margin:18px 0 18px 0;"></h2>
      <p id="simetria-previa-texto"></p>
    </div>
  </div>
  <div id="ley-desc"></div>
  <div id="sketch"></div>
  <footer id="ley-footer">
    <div id="ley-controls">
      <div id="ley-buttons">
        <button class="ley-btn" onclick="setLey(0)">Intro</button>
        <button class="ley-btn" onclick="setLey(1)">Agrupación</button>
        <button class="ley-btn" onclick="setLey(2)">1</button>
        <button class="ley-btn" onclick="setLey(3)">Semejanza</button>
        <button class="ley-btn" onclick="setLey(4)">2</button>
        <button class="ley-btn" onclick="setLey(5)">Continuidad</button>
        <button class="ley-btn" onclick="setLey(6)">3</button>
        <button class="ley-btn" onclick="setLey(7)">Cierre</button>
        <button class="ley-btn" onclick="setLey(8)">4</button>
        <button class="ley-btn" onclick="setLey(9)">Pregnancia</button>
        <button class="ley-btn" onclick="setLey(10)">5</button>
      </div>
      <div id="ley-slider">
        <label for="parametro-slider" style="margin-right:8px;">Ajuste parámetro:</label>
        <input type="range" id="parametro-slider" min="0" max="1" step="0.01" value="0.5" style="width:70%;">
        <span id="parametro-value">0.50</span>
      </div>
    </div>
  </footer>
  <div class="help" id="help">
    Atajos: <b>1</b> Proximidad · <b>2</b> Semejanza · <b>3</b> Continuidad ·
    <b>4</b> Cierre · <b>5</b> Simetría/Pregnancia · <b>[</b>/<b>]</b> ajustan el parámetro de la escena
  </div>

  <!-- p5.js local -->
  <script src="./libraries/p5.min.js"></script>
  <!-- contenido textual -->
  <script src="./contenido.js"></script>
  <!-- sketch p5 -->
  <script src="./sketch.js"></script>

  <!-- ============================================================
       SCRIPT PRINCIPAL — corre DESPUÉS de sketch.js y lo corrige.
       Funciona aunque el servidor tenga una versión vieja de sketch.js.
       ============================================================ -->
  <script>
  (function () {

    // ── Helpers ────────────────────────────────────────────────
    function escHTML(t) {
      return String(t)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function setReadableText(el, raw) {
      if (!el) return;
      var src = String(raw || '').trim();
      if (!src) { el.textContent = ''; return; }
      var parts = src.split(/\n\s*\n/g).map(function(p){ return p.trim(); }).filter(Boolean);
      if (parts.length > 1) {
        el.innerHTML = parts.map(escHTML).join('<br><br>'); return;
      }
      var sents = src.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [src];
      sents = sents.map(function(s){ return s.trim(); }).filter(Boolean);
      var blocks = [];
      for (var i = 0; i < sents.length; i += 2)
        blocks.push(sents.slice(i, i+2).join(' '));
      el.innerHTML = blocks.map(escHTML).join('<br><br>');
    }

    // ── setLey correcto — reemplaza cualquier versión anterior ─
    window.setLey = function (n) {
      window.leyActual = n;

      var ids = {
        0: 'intro-overlay',
        1: 'agrupacion-overlay',
        3: 'semejanza-previa-overlay',
        5: 'continuidad-previa-overlay',
        7: 'cierre-previa-overlay',
        9: 'simetria-previa-overlay'
      };

      // Ocultar todos los overlays
      Object.keys(ids).forEach(function(k) {
        var el = document.getElementById(ids[k]);
        if (el) el.style.display = 'none';
      });

      var sketchDiv  = document.getElementById('sketch');
      var sliderWrap = document.getElementById('ley-slider');

      if (sliderWrap)
        sliderWrap.style.display = ([2,4,6,8,10].indexOf(n) >= 0) ? 'block' : 'none';

      if (ids.hasOwnProperty(n)) {
        // Pantalla de texto
        var overlay = document.getElementById(ids[n]);
        if (overlay) overlay.style.display = 'block';
        if (sketchDiv) sketchDiv.style.display = 'none';
      } else {
        // Pantalla de canvas
        if (sketchDiv) sketchDiv.style.display = '';
        if (typeof redraw === 'function') redraw();
      }
    };

    // ── setup() de p5 reemplazado — el viejo sobreescribía botones ─
    window.setup = function () {
      var cnv = createCanvas(windowWidth, windowHeight);
      cnv.parent('sketch');
      textFont('Arial, sans-serif');
      textWrap(WORD);
      rectMode(CENTER);
      noLoop();
      // Slider
      var slider = document.getElementById('parametro-slider');
      if (slider) {
        slider.value = typeof parametro !== 'undefined' ? parametro : 0.5;
        slider.addEventListener('input', function () {
          window.parametro = parseFloat(this.value);
          var pv = document.getElementById('parametro-value');
          if (pv) pv.textContent = window.parametro.toFixed(2);
          redraw();
        });
      }
    };

    // ── Poblar overlays con contenido.js ──────────────────────
    function set(id, val) {
      var el = document.getElementById(id); if (el) el.textContent = val;
    }
    function setText(id, val) {
      setReadableText(document.getElementById(id), val);
    }

    try {
      set('intro-titulo',          INTRO.titulo);
      set('intro-gestalt-titulo',  INTRO.gestalt.titulo);
      setText('intro-gestalt-texto', INTRO.gestalt.texto);
      set('intro-arnheim-titulo',  INTRO.arnheim.titulo);
      setText('intro-arnheim-texto', INTRO.arnheim.texto);
    } catch(e) { console.error('intro:', e); }

    try {
      set('agrupacion-titulo',    AGRUPACION.titulo);
      set('agrupacion-subtitulo', AGRUPACION.subtitulo);
      setText('agrupacion-texto', AGRUPACION.texto);
    } catch(e) { console.error('agrupacion:', e); }

    try {
      set('semejanza-previa-titulo',    SEMEJANZA_PREVIA.titulo);
      set('semejanza-previa-subtitulo', SEMEJANZA_PREVIA.subtitulo);
      setText('semejanza-previa-texto', SEMEJANZA_PREVIA.texto);
    } catch(e) { console.error('semejanza-previa:', e); }

    try {
      set('continuidad-previa-titulo',    CONTINUIDAD_PREVIA.titulo);
      set('continuidad-previa-subtitulo', CONTINUIDAD_PREVIA.subtitulo);
      setText('continuidad-previa-texto', CONTINUIDAD_PREVIA.texto);
    } catch(e) { console.error('continuidad-previa:', e); }

    try {
      set('cierre-previa-titulo',    CIERRE_PREVIA.titulo);
      set('cierre-previa-subtitulo', CIERRE_PREVIA.subtitulo);
      setText('cierre-previa-texto', CIERRE_PREVIA.texto);
    } catch(e) { console.error('cierre-previa:', e); }

    try {
      set('simetria-previa-titulo',    SIMETRIA_PREVIA.titulo);
      set('simetria-previa-subtitulo', SIMETRIA_PREVIA.subtitulo);
      setText('simetria-previa-texto', SIMETRIA_PREVIA.texto);
    } catch(e) { console.error('simetria-previa:', e); }

    // ── Mostrar pantalla intro ─────────────────────────────────
    window.setLey(0);

  })();
  </script>
</body>
</html>

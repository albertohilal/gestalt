<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test Errors</title></head>
<body style="font-family:monospace; padding:20px;">
  <h1>Error Log</h1>
  <div id="errors" style="border:1px solid red; padding:10px; min-height:100px; background:#ffe6e6; white-space: pre-wrap; font-size:12px;"></div>
  
  <script>
    const errList = document.getElementById('errors');
    window.addEventListener('error', (e) => {
      errList.textContent += `[ERROR] ${e.message}\n  at ${e.filename}:${e.lineno}:${e.colno}\n\n`;
    });
    window.addEventListener('unhandledrejection', (e) => {
      errList.textContent += `[UNHANDLED REJECTION] ${e.reason}\n\n`;
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="./contenido.js"></script>
  <script src="./sketch.js"></script>
  
  <script>
    errList.textContent += 'Scripts loaded successfully!\n';
    errList.textContent += 'p5: ' + (typeof p5) + '\n';
    errList.textContent += 'INTRO: ' + (typeof INTRO) + '\n';
    errList.textContent += 'setLey: ' + (typeof setLey) + '\n';
  </script>
</body>
</html>

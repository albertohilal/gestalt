<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Inspect HTML</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .test { border: 2px solid green; padding: 10px; margin: 10px 0; }
    .error { border: 2px solid red; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Verificación de carga</h1>
  
  <div class="test">
    <h3>1. Verificar conexión CDN</h3>
    <div id="cdn-status">Cargando...</div>
  </div>
  
  <div class="test">
    <h3>2. Verificar contenido.js</h3>
    <div id="contenido-status">Cargando...</div>
  </div>
  
  <div class="test">
    <h3>3. Verificar sketch.js</h3>
    <div id="sketch-status">Cargando...</div>
  </div>
  
  <div class="test">
    <h3>4. Crear canvas simple</h3>
    <canvas id="test-canvas" width="200" height="200" style="border: 1px solid blue;"></canvas>
  </div>

  <script>
    document.getElementById('cdn-status').textContent = 'p5 antes de carga: ' + (typeof p5);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  
  <script>
    document.getElementById('cdn-status').textContent = 'p5 después de carga: ' + (typeof p5);
    
    // Test canvas without p5
    const canvas = document.getElementById('test-canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'blue';
    ctx.fillRect(50, 50, 100, 100);
    ctx.fillStyle = 'white';
    ctx.font = '12px Arial';
    ctx.fillText('Canvas OK', 70, 100);
  </script>

  <script src="./contenido.js"></script>
  
  <script>
    const status = document.getElementById('contenido-status');
    const checks = [
      {name: 'INTRO', value: typeof INTRO !== 'undefined'},
      {name: 'AGRUPACION', value: typeof AGRUPACION !== 'undefined'},
      {name: 'SEMEJANZA_PREVIA', value: typeof SEMEJANZA_PREVIA !== 'undefined'},
      {name: 'CONTINUIDAD_PREVIA', value: typeof CONTINUIDAD_PREVIA !== 'undefined'}
    ];
    status.innerHTML = checks.map(c => `${c.name}: ${c.value ? '✓' : '✗'}`).join('<br>');
  </script>

  <script src="./sketch.js"></script>
  
  <script>
    const status2 = document.getElementById('sketch-status');
    const checks2 = [
      {name: 'setLey', value: typeof setLey !== 'undefined'},
      {name: 'escapeHTML', value: typeof escapeHTML !== 'undefined'},
      {name: 'setReadableText', value: typeof setReadableText !== 'undefined'}
    ];
    status2.innerHTML = checks2.map(c => `${c.name}: ${c.value ? '✓' : '✗'}`).join('<br>');
  </script>
</body>
</html>
